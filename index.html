<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIH3201 EMG Wristband Prototype</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: sans-serif;
        }
        /* Top Left Status Overlay */
        #status { 
            position: absolute; 
            top: 2vw;  
            left: 2vw; 
            color: #00ff00; 
            font-size: clamp(14px, 2vw, 20px); 
            font-weight: bold; 
            background: rgba(0,0,0,0.7); 
            padding: clamp(8px, 1vw, 20px); 
            border-radius: 8px;
            max-width: 90vw; 
            word-wrap: break-word;
            z-index: 10;
        }
        
        /* Top Right Instruction Panel */
        #instructions {
            position: absolute;
            top: 2vw;
            right: 2vw;
            color: #ffffff;
            background: rgba(0,0,0,0.7);
            padding: clamp(10px, 1.5vw, 20px);
            border-radius: 8px;
            z-index: 10;
            font-size: clamp(12px, 1.2vw, 16px);
            max-width: 250px;
        }
        #instructions h3 {
            margin: 0 0 10px 0;
            color: #00ff00;
            font-size: clamp(14px, 1.5vw, 18px);
            text-align: center;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        #instructions ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        #instructions li {
            margin-bottom: 8px;
            line-height: 1.4;
        }
        #instructions b {
            color: #00ccff;
        }

        /* Bottom Right Webcam Container */
        #camera-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            border: 3px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transform: scaleX(-1); 
        }
        #output_canvas {
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 20;
            transition: opacity 0.5s;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ==========================================
           MOBILE RESPONSIVENESS (Phones / Tablets)
           ========================================== */
        @media (max-width: 768px) {
            #camera-container {
                width: 35vw; /* Shrinks camera so it doesn't take up the whole screen */
                height: 26.25vw; /* Keeps the 4:3 video ratio */
                bottom: 10px;
                right: 10px;
                border-width: 2px;
            }
            #instructions {
                top: auto;
                bottom: 10px;
                left: 10px; /* Moves instructions to bottom left to prevent overlapping */
                right: auto;
                max-width: 45vw; /* Ensures it doesn't hit the camera */
            }
            #status {
                top: 10px;
                left: 10px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="loading">Loading AI Models & 3D Environment... Please Allow Camera Access.</div>
    
    <div id="status">Initializing...</div>
    
    <div id="instructions">
        <h3>Gesture Guide</h3>
        <ul>
            <li><b>OK Sign:</b> Lights On</li>
            <li><b>Pinch:</b> Lights Off</li>
            <li><b>Fist w/thumb out:</b> Emergency</li>
            <li><b>2 Fingers:</b> Bed -> Seating</li>
            <li><b>L-Shape:</b> Bed -> Flat</li>
            <li><b>Open Palm:</b> Everything Off</li>
            <li><b>3 Fingers:</b> Toggle Fan</li>
        </ul>
    </div>
    
    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // 1. SETUP 3D SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#2a2a35');
        
        // Dynamically set camera distance based on screen width
        const isMobile = window.innerWidth < 768;
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, isMobile ? 15 : 10); // Pulls camera back to 15 on mobile
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            // Adjust camera zoom if window is resized past mobile threshold
            if (window.innerWidth < 768) {
                camera.position.z = 15;
            } else {
                camera.position.z = 10;
            }
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const floorGeo = new THREE.PlaneGeometry(15, 15);
        const floorMat = new THREE.MeshStandardMaterial({ color: '#555555' });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3); 
        scene.add(ambientLight);
        const mainLight = new THREE.PointLight(0xffffff, 0.1, 100);
        mainLight.position.set(0, 8, 0);
        scene.add(mainLight);

        const bedBaseGeo = new THREE.BoxGeometry(3, 1, 6);
        const bedMat = new THREE.MeshStandardMaterial({ color: '#4a90e2' });
        const bedBase = new THREE.Mesh(bedBaseGeo, bedMat);
        bedBase.position.set(-2, 0.5, 0);
        scene.add(bedBase);

        const mattressMat = new THREE.MeshStandardMaterial({ color: '#ffffff' });
        const headrestPivot = new THREE.Group(); 
        headrestPivot.position.set(-2, 1, -0.5); 
        scene.add(headrestPivot);
        
        const headrest = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 2.5), mattressMat);
        headrest.position.set(0, 0.25, -1.25); 
        headrestPivot.add(headrest);

        const lowerMattress = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 3.5), mattressMat);
        lowerMattress.position.set(-2, 1.25, 1.25);
        scene.add(lowerMattress);

        const fanGroup = new THREE.Group();
        fanGroup.position.set(0, 6.5, 0);
        const bladeMat = new THREE.MeshStandardMaterial({ color: '#e6a822' });
        const blades = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 0.5), bladeMat);
        const blades2 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 0.5), bladeMat);
        blades2.rotation.y = Math.PI / 2;
        fanGroup.add(blades);
        fanGroup.add(blades2);
        scene.add(fanGroup);

        // 2. MEDIAPIPE AI & GESTURE LOGIC 
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const statusDiv = document.getElementById('status');
        
        let handLandmarker = undefined;
        let lastVideoTime = -1;

        let currentTrackedGesture = "NONE";
        let gestureStartTime = 0;
        let confirmedAction = "None";
        const CONFIRM_SECONDS = 2.0;

        const actionMap = {
            "OK_SIGN": "TURN ON LIGHTS",
            "PINCH": "TURN OFF LIGHTS",
            "THUMB_OUT": "EMERGENCY: REQUEST HELP",
            "TWO_FINGERS": "BED: ADJUST TO SEATING ANGLE",
            "L_SHAPE": "BED: ADJUST TO FLAT ANGLE",
            "OPEN_PALM": "EVERYTHING OFF",
            "THREE_FINGERS": "TOGGLE FAN",
        };

        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1,
                minHandDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            document.getElementById("loading").style.opacity = "0";
            setTimeout(() => document.getElementById("loading").remove(), 500);
            startCamera();
        }

        function startCamera() {
            // Added ideal facing mode to default to front camera on mobile
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        function getRawGesture(landmarks) {
            const wrist = landmarks[0];
            const getDist = (lm1, lm2) => Math.hypot(lm1.x - lm2.x, lm1.y - lm2.y);
            
            const index_open = getDist(landmarks[8], wrist) > getDist(landmarks[5], wrist);
            const middle_open = getDist(landmarks[12], wrist) > getDist(landmarks[9], wrist);
            const ring_open = getDist(landmarks[16], wrist) > getDist(landmarks[13], wrist);
            const pinky_open = getDist(landmarks[20], wrist) > getDist(landmarks[17], wrist);
            
            const thumb_is_open = getDist(landmarks[4], landmarks[17]) > getDist(landmarks[2], landmarks[17]);
            
            const pinch_dist = getDist(landmarks[8], landmarks[4]);
            const is_pinching = pinch_dist < 0.08;

            if (is_pinching) {
                if (middle_open && ring_open && pinky_open) return "OK_SIGN";
                else return "PINCH";
            }
            else if (index_open && middle_open && ring_open && pinky_open && thumb_is_open) return "OPEN_PALM";
            else if (!index_open && !middle_open && !ring_open && !pinky_open) {
                return "THUMB_OUT";
            }
            else if (index_open && middle_open && ring_open && !pinky_open) return "THREE_FINGERS";
            else if (index_open && middle_open && !ring_open && !pinky_open) return "TWO_FINGERS";
            else if (thumb_is_open && index_open && !middle_open && !ring_open && !pinky_open) return "L_SHAPE";
            return "NONE";
        }

        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            let startTimeMs = performance.now();

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    
                    const drawingUtils = new DrawingUtils(canvasCtx);
                    drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 3 });
                    drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 1, radius: 3 });

                    const gesture = getRawGesture(landmarks);
                    const currentTime = performance.now() / 1000; 

                    if (actionMap[gesture]) {
                        if (gesture === currentTrackedGesture) {
                            let elapsedTime = currentTime - gestureStartTime;
                            
                            if (elapsedTime >= CONFIRM_SECONDS) {
                                confirmedAction = actionMap[gesture] === "CLEAR SYSTEM" ? "None" : actionMap[gesture];
                                statusDiv.innerText = `🟢 CONFIRMED: ${confirmedAction}`;
                                statusDiv.style.color = "#00ff00";
                                execute3DAction(confirmedAction); 
                                currentTrackedGesture = "NONE"; 
                            } else {
                                statusDiv.innerText = `🟡 HOLDING: ${actionMap[gesture]} (${Math.floor(elapsedTime)}s)`;
                                statusDiv.style.color = "#ffff00";
                            }
                        } else {
                            currentTrackedGesture = gesture;
                            gestureStartTime = currentTime;
                            statusDiv.innerText = `🔵 DETECTED: ${actionMap[gesture]}`;
                            statusDiv.style.color = "#00ccff";
                        }
                    } else {
                        currentTrackedGesture = "NONE";
                        statusDiv.innerText = `⚪ LISTENING...`;
                        statusDiv.style.color = "#cccccc";
                    }
                } else {
                    currentTrackedGesture = "NONE";
                    statusDiv.innerText = `⚪ LISTENING...`;
                    statusDiv.style.color = "#cccccc";
                }
                canvasCtx.restore();
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // ==========================================
        // 3. THREE.JS ANIMATION ENGINE
        // ==========================================
        let targetHeadrestAngle = 0;
        let isFanOn = false;
        let isEmergency = false;

        function execute3DAction(action) {
            switch(action) {
                case "TURN ON LIGHTS":
                    mainLight.intensity = 2.0; ambientLight.intensity = 0.8; isEmergency = false; break;
                case "TURN OFF LIGHTS":
                    mainLight.intensity = 0.1; ambientLight.intensity = 0.3; isEmergency = false; break;
                case "BED: ADJUST TO SEATING ANGLE": targetHeadrestAngle = Math.PI / 4; break;
                case "BED: ADJUST TO FLAT ANGLE": targetHeadrestAngle = 0; break;
                case "TOGGLE FAN": isFanOn = !isFanOn; break;
                case "EMERGENCY: REQUEST HELP": isEmergency = true; break;
                case "EVERYTHING OFF":
                    mainLight.intensity = 0.1; ambientLight.intensity = 0.3;
                    isFanOn = false; targetHeadrestAngle = 0; isEmergency = false; break;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            headrestPivot.rotation.x += (targetHeadrestAngle - headrestPivot.rotation.x) * 0.05;
            if (isFanOn) fanGroup.rotation.y += 0.05;
            if (isEmergency) {
                mainLight.color.setHex(Date.now() % 1000 < 500 ? 0xff0000 : 0x220000);
                mainLight.intensity = 3.0;
            } else {
                mainLight.color.setHex(0xffffff);
            }
            renderer.render(scene, camera);
        }
        
        createHandLandmarker();
        animate();
    </script>
</body>
</html>
